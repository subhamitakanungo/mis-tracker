<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIS Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #efefed;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #a0a0a0;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --success-bg: #f0fdf4; --success-border: #86efac; --success-text: #15803d;
    --info-bg: #eff6ff; --info-border: #93c5fd; --info-text: #1d4ed8;
    --danger-bg: #fef2f2; --danger-border: #fca5a5; --danger-text: #dc2626;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e;
      --text: #f0f0f0; --text2: #a0a0a0; --text3: #6b6b6b;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --success-bg: #052e16; --success-border: #166534; --success-text: #86efac;
      --info-bg: #1e3a5f; --info-border: #1d4ed8; --info-text: #93c5fd;
      --danger-bg: #3b0a0a; --danger-border: #991b1b; --danger-text: #fca5a5;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: var(--text); background: var(--bg3); min-height: 100vh; }

  /* HEADER */
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 12px; height: 56px; position: sticky; top: 0; z-index: 50; }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--text2); font-weight: 400; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg3); flex-shrink: 0; }
  .dot.live { background: #22c55e; }
  .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  .dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  #statusTxt { font-size: 12px; color: var(--text2); }
  header .spacer { flex: 1; }

  /* MAIN */
  main { max-width: 1300px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }

  /* STATS */
  .stats { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 16px; font-size: 12px; color: var(--text2); }
  .stat strong { display: block; font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.2; }

  /* TOOLBAR */
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); width: 14px; height: 14px; }
  .search-wrap input { width: 100%; height: 36px; padding: 0 10px 0 32px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
  .search-wrap input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .btn { height: 36px; padding: 0 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; transition: background .15s; }
  .btn:hover { background: var(--bg2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn.primary:hover { opacity: 0.85; }

  /* TABLE */
  .table-wrap { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 980px; font-size: 13px; }
  thead { background: var(--bg2); }
  th { padding: 10px 12px; text-align: left; font-weight: 500; font-size: 11px; color: var(--text2); border-bottom: 0.5px solid var(--border); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.4px; }
  td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg2); }
  .col-no { width: 36px; color: var(--text3); font-size: 12px; }
  .app-name { font-weight: 500; }
  .muted { color: var(--text2); font-size: 12px; max-width: 180px; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--info-bg); color: var(--info-text); border: 0.5px solid var(--info-border); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* TOGGLE */
  .toggle { width: 24px; height: 24px; border-radius: 6px; border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; transition: background .15s, opacity .15s; }
  .toggle.yes { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
  .toggle.no { background: var(--bg2); color: var(--text3); }
  .toggle.saving { opacity: 0.4; cursor: wait; pointer-events: none; }

  /* ROW ACTIONS */
  .row-actions { display: flex; gap: 4px; }
  .edit-btn { height: 28px; padding: 0 10px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 6px; background: var(--bg); color: var(--text); cursor: pointer; }
  .edit-btn:hover { background: var(--bg2); }
  .del-btn { height: 28px; padding: 0 10px; font-size: 12px; border: 0.5px solid var(--danger-border); border-radius: 6px; background: var(--bg); color: var(--danger-text); cursor: pointer; }
  .del-btn:hover { background: var(--danger-bg); }

  /* EMPTY / LOADING */
  .empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 13px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 1.5rem; width: min(520px, 100%); max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .modal-header h3 { font-size: 15px; font-weight: 600; }
  .close-btn { width: 28px; height: 28px; border: none; background: none; cursor: pointer; color: var(--text2); font-size: 18px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
  .close-btn:hover { background: var(--bg2); }
  .field { margin-bottom: 0.875rem; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
  .field input, .field textarea { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
  .field input:focus, .field textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .field textarea { resize: vertical; min-height: 64px; }
  .checks-section { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .checks-section label.section-label { display: block; font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .checks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .check-field { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
  .check-field:hover { background: var(--bg2); }
  .check-field input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #3b82f6; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }

  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: var(--radius); font-size: 13px; z-index: 300; opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    header { padding: 0 1rem; }
    .checks-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">MIS <span>Tracker</span></div>
  <div class="dot loading" id="dot"></div>
  <span id="statusTxt">Connecting...</span>
  <div class="spacer"></div>
</header>

<main>
  <div class="stats" id="stats">
    <div class="stat"><strong>—</strong> Total apps</div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search by name, users, manager..." oninput="render()">
    </div>
    <button class="btn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Refresh
    </button>
    <button class="btn primary" onclick="openModal()">+ Add App</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-no">#</th>
          <th>MIS Name</th>
          <th>Description</th>
          <th>Users</th>
          <th>Managed By</th>
          <th>Ticket</th>
          <th>2FA</th>
          <th>SSO</th>
          <th>Manual</th>
          <th>Admin</th>
          <th>FAQ</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="12" class="empty"><span class="spinner"></span></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add application</h3>
      <button class="close-btn" onclick="closeModal()">&#215;</button>
    </div>
    <div class="field"><label>MIS Name *</label><input id="fName" placeholder="e.g. Shishu Ghar - CMS"></div>
    <div class="field"><label>Description</label><textarea id="fDesc" placeholder="What does this app do?"></textarea></div>
    <div class="field"><label>Users</label><input id="fUsers" placeholder="e.g. Creche Initiatives (#1500+ creches, 29k kids)"></div>
    <div class="field"><label>Managed By</label><input id="fMgr" placeholder="e.g. Partner: Microware"></div>
    <div class="field">
      <div class="checks-section">
        <label class="section-label">Compliance & Features</label>
        <div class="checks-grid">
          <label class="check-field"><input type="checkbox" id="fTicket"> Ticket Support</label>
          <label class="check-field"><input type="checkbox" id="f2fa"> 2FA</label>
          <label class="check-field"><input type="checkbox" id="fSso"> SSO</label>
          <label class="check-field"><input type="checkbox" id="fManual"> User Manual</label>
          <label class="check-field"><input type="checkbox" id="fAdmin"> User Admin</label>
          <label class="check-field"><input type="checkbox" id="fFaq"> FAQ</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" id="saveBtn" onclick="saveApp()">Save to Sheet</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzM_EUgCpawJAL6tuH_NDrfXANKKd_HKYn9qTRs0u_z5hzy2bphFmv_TkbO5IKlGgTO/exec";
const BOOL_KEYS = ["Ticket Support","2FA","SSO","User Manual","User Admin","FAQ"];

let apps = [];
let editRow = null;

function setStatus(state, msg) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusTxt').textContent = msg;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function isBool(v) { return v === true || v === 'TRUE' || v === 'Yes' || v === 1; }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadData() {
  setStatus('loading', 'Loading...');
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const json = await res.json();
    if (json.status === 'ok') {
      apps = json.data;
      setStatus('live', 'Live · ' + apps.length + ' apps');
      render();
    } else {
      setStatus('error', 'Sheet error');
    }
  } catch(e) {
    setStatus('error', 'Connection failed');
    document.getElementById('tbody').innerHTML = `<tr><td colspan="12" class="empty">Could not connect to Google Sheet.<br>Check your Apps Script deployment settings.</td></tr>`;
  }
}

async function apiPost(payload) {
  const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
  return await res.json();
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const filtered = apps.filter(a => !q ||
    [a['MIS Name'], a['Description'], a['Users'], a['Managed By']]
    .some(v => (v || '').toLowerCase().includes(q))
  );

  const total = apps.length;
  const counts = BOOL_KEYS.map(k => apps.filter(a => isBool(a[k])).length);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong>${total}</strong> Total Apps</div>
    <div class="stat"><strong>${counts[1]}/${total}</strong> 2FA Enabled</div>
    <div class="stat"><strong>${counts[2]}/${total}</strong> SSO Enabled</div>
    <div class="stat"><strong>${counts[0]}/${total}</strong> Ticket Support</div>
    <div class="stat"><strong>${counts[3]}/${total}</strong> User Manual</div>
    <div class="stat"><strong>${counts[5]}/${total}</strong> FAQ</div>
  `;

  if (!filtered.length) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="12" class="empty">No apps found</td></tr>`;
    return;
  }

  document.getElementById('tbody').innerHTML = filtered.map((a, i) => `
    <tr>
      <td class="col-no">${i + 1}</td>
      <td class="app-name">${esc(a['MIS Name']) || '—'}</td>
      <td class="muted">${esc(a['Description']) || '<span style="color:var(--text3)">—</span>'}</td>
      <td class="muted" style="max-width:160px">${esc(a['Users']) || '<span style="color:var(--text3)">—</span>'}</td>
      <td>${a['Managed By'] ? `<span class="tag" title="${esc(a['Managed By'])}">${esc(a['Managed By'])}</span>` : '<span style="color:var(--text3)">—</span>'}</td>
      ${BOOL_KEYS.map(k => `
        <td>
          <div class="toggle ${isBool(a[k]) ? 'yes' : 'no'}"
               id="t-${a._row}-${k.replace(/\s/g,'_')}"
               onclick="toggleBool(${a._row},'${k}',this)">
            ${isBool(a[k]) ? '&#10003;' : ''}
          </div>
        </td>`).join('')}
      <td>
        <div class="row-actions">
          <button class="edit-btn" onclick="openModal(${a._row})">Edit</button>
          <button class="del-btn" onclick="deleteRow(${a._row}, '${esc(a['MIS Name'])}')">Del</button>
        </div>
      </td>
    </tr>`).join('');
}

async function toggleBool(rowNum, key, el) {
  if (el.classList.contains('saving')) return;
  const a = apps.find(x => x._row === rowNum);
  if (!a) return;
  const newVal = !isBool(a[key]);
  el.classList.add('saving');
  a[key] = newVal ? 'Yes' : 'No';
  try {
    await apiPost({ action: 'update', row: rowNum, data: { [key]: newVal ? 'Yes' : 'No' } });
    el.className = 'toggle ' + (newVal ? 'yes' : 'no');
    el.innerHTML = newVal ? '&#10003;' : '';
    toast((newVal ? '✓ ' : '✗ ') + key + ' updated');
    render();
  } catch(e) {
    a[key] = newVal ? 'No' : 'Yes';
    el.classList.remove('saving');
    toast('Failed to update');
  }
}

function openModal(rowNum) {
  editRow = rowNum || null;
  const a = rowNum ? apps.find(x => x._row === rowNum) : {};
  document.getElementById('modalTitle').textContent = rowNum ? 'Edit application' : 'Add application';
  document.getElementById('saveBtn').textContent = rowNum ? 'Update Sheet' : 'Save to Sheet';
  document.getElementById('fName').value = a['MIS Name'] || '';
  document.getElementById('fDesc').value = a['Description'] || '';
  document.getElementById('fUsers').value = a['Users'] || '';
  document.getElementById('fMgr').value = a['Managed By'] || '';
  document.getElementById('fTicket').checked = isBool(a['Ticket Support']);
  document.getElementById('f2fa').checked = isBool(a['2FA']);
  document.getElementById('fSso').checked = isBool(a['SSO']);
  document.getElementById('fManual').checked = isBool(a['User Manual']);
  document.getElementById('fAdmin').checked = isBool(a['User Admin']);
  document.getElementById('fFaq').checked = isBool(a['FAQ']);
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editRow = null;
}

async function saveApp() {
  const name = document.getElementById('fName').value.trim();
  if (!name) {
    document.getElementById('fName').style.borderColor = '#ef4444';
    document.getElementById('fName').focus();
    return;
  }
  document.getElementById('fName').style.borderColor = '';
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner"></span>';

  const data = {
    'MIS Name': name,
    'Description': document.getElementById('fDesc').value.trim(),
    'Users': document.getElementById('fUsers').value.trim(),
    'Managed By': document.getElementById('fMgr').value.trim(),
    'Ticket Support': document.getElementById('fTicket').checked ? 'Yes' : 'No',
    '2FA': document.getElementById('f2fa').checked ? 'Yes' : 'No',
    'SSO': document.getElementById('fSso').checked ? 'Yes' : 'No',
    'User Manual': document.getElementById('fManual').checked ? 'Yes' : 'No',
    'User Admin': document.getElementById('fAdmin').checked ? 'Yes' : 'No',
    'FAQ': document.getElementById('fFaq').checked ? 'Yes' : 'No',
  };

  try {
    if (editRow) {
      await apiPost({ action: 'update', row: editRow, data });
      toast('App updated successfully');
    } else {
      await apiPost({ action: 'add', data });
      toast('App added to Sheet');
    }
    closeModal();
    await loadData();
  } catch(e) {
    toast('Failed to save. Try again.');
  }

  saveBtn.disabled = false;
  saveBtn.textContent = editRow ? 'Update Sheet' : 'Save to Sheet';
}

async function deleteRow(rowNum, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await apiPost({ action: 'delete', row: rowNum });
    toast('App deleted');
    await loadData();
  } catch(e) {
    toast('Delete failed.');
  }
}

document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open') && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    saveApp();
  }
});

loadData();
</script>
</body>
</html>
